---
# global vars file

# k3s cluster
k3s_server_host: kube01.local

# Static /etc/hosts entries for cluster nodes (mDNS not reliable in Go-based tools)
cluster_hosts:
  - ip: 10.0.1.30
    names: "kube01.local kube01"
  - ip: 10.0.1.50
    names: "kube02.local kube02"
  - ip: 10.0.1.49
    names: "kube03.local kube03"
  - ip: 10.0.1.203
    names: "20-size.local 20-size"

# NFS and storage
nfs_server: 20-size.local
server_config_path: /whidbey/configs/
server_media_path: /snoqualmie/media/
media_mount_path: /mnt/media/
configs_mount_path: /mnt/configs/

common_users:
  - jehan
  - pi
  - ansible

# Claude AI agent SSH public key (private key: ~/.ssh/claude_homelab)
claude_ssh_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+aPw5R/OwsXml7FNuRm56ndZC9sY5gXieyJ8t5fIEp claude@homelab"

# Plex — advertised address for plex.tv relay; uses dynamic DNS so IP churn doesn't require a redeploy
plex_advertise_ip: "http://dynamic.alvani.me:32400"

# DNS servers for static netplan config
static_dns_servers:
  - 10.0.1.250  # Pi-hole
  - 10.0.1.1    # Router fallback
