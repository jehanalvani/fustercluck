# Traefik BasicAuth middleware — applied to all external (*.alvani.me) ingresses
# except Plex (would break the Plex app).
#
# To update credentials: htpasswd -nb username password
# then update the Secret below and re-apply.
apiVersion: v1
kind: Secret
metadata:
  name: traefik-basic-auth
  namespace: kube-system
type: Opaque
stringData:
  users: "jehan:$apr1$YcVwcIGc$KP.5FUTe7VldzDsODXp2S."
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: traefik-basic-auth
