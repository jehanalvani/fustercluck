# Traefik BasicAuth middleware — applied to all external (*.alvani.me) ingresses
# except Plex (would break the Plex app).
#
# To update credentials:
#   htpasswd -nb username newpassword
#   kubectl create secret generic traefik-basic-auth --namespace=kube-system \
#     --from-literal=users='username:hash' --dry-run=client -o yaml \
#     | kubeseal --cert k8s/secrets/pub-cert.pem -o yaml \
#     > k8s/secrets/traefik-basic-auth-sealed.yml
#   kubectl apply -f k8s/secrets/traefik-basic-auth-sealed.yml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: traefik-basic-auth
