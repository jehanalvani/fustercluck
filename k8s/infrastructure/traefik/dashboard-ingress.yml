# Traefik Dashboard IngressRoute
# Exposes the Traefik dashboard at https://traefik.alvani.me
# Uses api@internal - Traefik's built-in dashboard service
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.alvani.me`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-tls
---
# TLS Certificate for traefik.alvani.me
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-tls
  namespace: kube-system
spec:
  secretName: traefik-dashboard-tls
  issuerRef:
    name: letsencrypt-issuer
    kind: ClusterIssuer
  dnsNames:
    - traefik.alvani.me
