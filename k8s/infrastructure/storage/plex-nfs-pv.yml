# Plex storage configuration
# Three PVs: config, transcode, and media - all on NFS at 20-size.local
# Note: NFS doesn't enforce storage capacity - these are nominal sizes
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-config-pv
spec:
  capacity:
    storage: 50Gi  # Nominal - NFS doesn't enforce this
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 20-size.local
    path: /seatac/plex/config
  mountOptions:
    - hard
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 50Gi
  volumeName: plex-config-pv
---
# Plex transcode cache (temporary - can use local storage for performance)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-transcode-pv
spec:
  capacity:
    storage: 100Gi  # Nominal - NFS doesn't enforce this
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 20-size.local
    path: /seatac/plex/transcode
  mountOptions:
    - hard
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-transcode-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 100Gi
  volumeName: plex-transcode-pv
---
# Plex media access (shared with all media apps)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-media-pv
spec:
  capacity:
    storage: 10Ti  # Nominal - NFS doesn't enforce this
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 20-size.local
    path: /snoqualmie/media
  mountOptions:
    - hard
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 10Ti
  volumeName: plex-media-pv
