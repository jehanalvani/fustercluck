# Shared read-write media NFS PersistentVolume
# All media apps mount this for access to /snoqualmie/media
# Note: NFS doesn't enforce storage capacity - these are nominal sizes
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs-pv
spec:
  capacity:
    storage: 10Ti  # Nominal - NFS doesn't enforce this
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 20-size.local
    path: /snoqualmie/media
  mountOptions:
    - hard
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-nfs-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 10Ti
  volumeName: media-nfs-pv
