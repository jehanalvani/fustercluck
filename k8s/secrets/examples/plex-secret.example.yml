---
# Example Plex Secret
# This secret is referenced in k8s/apps/plex/values.yml
#
# PLEX_CLAIM is only needed for initial registration with plex.tv
# To obtain a claim token, visit: https://www.plex.tv/claim/
# The token is valid for 4 minutes from generation
#
# Once Plex is initialized and claimed, you can remove the PLEX_CLAIM
# environment variable from the values file
#
# To create the actual secret:
# kubectl create secret generic plex-secret \
#   --from-literal=PLEX_CLAIM='claim-your-token-here' \
#   -n plex

apiVersion: v1
kind: Secret
metadata:
  name: plex-secret
  namespace: plex
type: Opaque
stringData:
  # Plex claim token from https://www.plex.tv/claim/
  # This is only used once during initial setup
  PLEX_CLAIM: claim-your-token-here
