---
# Example Grafana Cloud Secret
# All values obtained from grafana.com → My Account → Stack → Details
#
# To create the actual secret:
# kubectl create secret generic grafana-cloud-secret \
#   --from-literal=prometheus-url='https://prometheus-prod-XX-prod-us-east-0.grafana.net/api/prom/push' \
#   --from-literal=prometheus-user='123456' \
#   --from-literal=loki-url='https://logs-prod-XX.grafana.net/loki/api/v1/push' \
#   --from-literal=loki-user='123456' \
#   --from-literal=api-key='your-grafana-cloud-api-key' \
#   -n monitoring

apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-secret
  namespace: monitoring
type: Opaque
stringData:
  # Prometheus remote write endpoint
  prometheus-url: https://prometheus-prod-67-prod-us-west-0.grafana.net/api/prom/push
  # Prometheus numeric user ID
  prometheus-user: "3065256"
  # Loki push endpoint
  loki-url: https://logs-prod-021.grafana.net/loki/api/v1/push
  # Loki numeric user ID
  loki-user: "1528303"
  # Grafana Cloud API key with MetricsPublisher + LogsPublisher scopes
  api-key: your-grafana-cloud-api-key
