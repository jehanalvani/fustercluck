# DO NOT COMMIT WITH REAL VALUES - use kubeseal to create sealed version
# See k8s/secrets/README.md for sealing instructions
#
# To create a sealed version:
#   kubectl create secret generic nzbget-secret \
#     --namespace=media \
#     --from-literal=NZBGET_USER=your-username \
#     --from-literal=NZBGET_PASS=your-password \
#     --dry-run=client -o yaml | kubeseal --cert pub-cert.pem -o yaml > k8s/secrets/nzbget-sealed-secret.yml
#
apiVersion: v1
kind: Secret
metadata:
  name: nzbget-secret
  namespace: media
type: Opaque
stringData:
  NZBGET_USER: "your-nzbget-username"
  NZBGET_PASS: "your-nzbget-password"
