---
# Example Shinobi Database Secret
# This secret is referenced in k8s/apps/security/shinobi/values.yml
# for MySQL initialization and Shinobi database access
#
# To create the actual secret:
# kubectl create secret generic shinobi-db-secret \
#   --from-literal=MYSQL_ROOT_PASSWORD='your-root-password' \
#   --from-literal=MYSQL_DATABASE='shinobi' \
#   --from-literal=MYSQL_USER='shinobi' \
#   --from-literal=MYSQL_PASSWORD='your-shinobi-password' \
#   -n security

apiVersion: v1
kind: Secret
metadata:
  name: shinobi-db-secret
  namespace: security
type: Opaque
stringData:
  # MySQL root password (used for initial setup)
  MYSQL_ROOT_PASSWORD: changeme-root

  # Database name for Shinobi
  MYSQL_DATABASE: shinobi

  # Database user for Shinobi
  MYSQL_USER: shinobi

  # Password for Shinobi database user
  MYSQL_PASSWORD: changeme-shinobi
