---
# Grafana Cloud Synthetic Monitoring — private probe token
#
# How to get the token:
#   1. Grafana Cloud → Synthetic Monitoring → Private probes → Add probe
#   2. Name it "homelab-private", region: Other
#   3. Copy the generated API token — shown only once
#
# To create the secret:
# kubectl create secret generic sm-private-probe-secret \
#   --from-literal=token='your-probe-connection-token' \
#   --from-literal=api-server='synthetic-monitoring-grpc-<region>.grafana.net:443' \
#   -n monitoring
#
# The SM API token is also used by create_synthetics.yml to register checks.
# Store it separately in Ansible vault: vars/vault.yml key: sm_api_token

apiVersion: v1
kind: Secret
metadata:
  name: sm-private-probe-secret
  namespace: monitoring
type: Opaque
stringData:
  # One-time probe connection token — generated by the Add Probe UI flow
  token: your-probe-connection-token
  # GRPC endpoint — shown alongside the token in the UI
  api-server: synthetic-monitoring-grpc-us-east-0.grafana.net:443
