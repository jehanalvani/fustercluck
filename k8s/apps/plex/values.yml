# Chart: bjw-s/app-template
# Repo: https://bjw-s.github.io/helm-charts
# Plex Media Server - Media streaming server with GPU acceleration

controllers:
  main:
    pod:
      # GPU runtime for NVIDIA GPU support
      runtimeClassName: nvidia
      # Pin to media nodes
      nodeSelector:
        node-role.kubernetes.io/media: "true"
      # Tolerate media node taint
      tolerations:
        - key: dedicated
          operator: Equal
          value: media
          effect: NoSchedule
    containers:
      main:
        image:
          repository: linuxserver/plex
          tag: "latest@sha256:a27f1ce1e1d14cd3627ed217f042bf8de0f796ed274fb27b2dc971ae22a64b95"
        env:
          TZ: America/Los_Angeles
          PUID: "1002"
          PGID: "100"
          PLEX_UID: "1002"
          PLEX_GID: "100"
          # GPU support
          NVIDIA_VISIBLE_DEVICES: all
          NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
          VERSION: docker
          # Advertise the correct external address so Plex registers properly with plex.tv.
          # Must match the public IP:port forwarded by the router to any k3s node.
          ADVERTISE_IP: "http://50.54.134.200:32400"
          # PLEX_CLAIM is only needed for initial registration with plex.tv
          # Once configured, this can be removed from the values file
          PLEX_CLAIM:
            valueFrom:
              secretKeyRef:
                name: plex-secret
                key: PLEX_CLAIM
        securityContext:
          privileged: false
          capabilities:
            add: ["SYS_NICE"]
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 32400
              initialDelaySeconds: 120
              periodSeconds: 20
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 32400
              initialDelaySeconds: 120
              periodSeconds: 20
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 4Gi
            # GPU request
            nvidia.com/gpu: "1"

service:
  main:
    controller: main
    type: NodePort
    ports:
      http:
        port: 32400
        nodePort: 32400
      dlna:
        port: 19989

ingress:
  main:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
    hosts:
      - host: plex.alvani.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: plex-tls
        hosts:
          - plex.alvani.me

persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: plex-config-pvc
    globalMounts:
      - path: /config
  transcode:
    type: emptyDir
    globalMounts:
      - path: /transcode
  media:
    type: persistentVolumeClaim
    existingClaim: plex-media-pvc
    globalMounts:
      - path: /media
