# Grafana Cloud Synthetic Monitoring — check definitions
# Processed by create_synthetics.yml to register checks via the SM API.
#
# Label taxonomy:
#   env=homelab         — all checks
#   tier=<tier>         — media | security | monitoring | network | infra
#   service=<name>      — short service name (matches Loki/Grafana dashboards)
#   probe=external      — public Grafana probe network (validates public reachability)
#   probe=internal      — private in-cluster probe (validates LAN/cluster reachability)
#
# Probes:
#   external: uses the built-in Grafana public probe network (probe names vary by region)
#   internal: homelab-private — the private probe deployed in monitoring namespace
#
# Check frequency: 60s (external), 30s (internal)
# TLS: internal checks skip verification (homelab-ca-issuer cert, not yet publicly trusted)
#      external checks enforce TLS (will use Let's Encrypt after cert-manager DNS-01 migration)

# ============================================================
# HTTP/HTTPS checks — cluster services
# ============================================================

http_checks:

  # External only — proves ingress stack + TLS works from outside the network.
  # Internal HTTP checks removed: Marvin's health check covers LAN reachability.
  - service: traefik
    tier: monitoring
    target: https://traefik.alvani.me
    probes: [external]

  - service: plex
    tier: media
    target: https://plex.alvani.me
    probes: [external]

# ============================================================
# DNS checks — internal probe only (Pi-hole on LAN)
# ============================================================

dns_checks:

  - service: pihole
    tier: network
    # Resolve a reliable public domain via Pi-hole
    target: dns://10.0.1.250
    query: grafana.com
    record_type: A
    probes: [internal]

  - service: pihole-local-dns
    tier: network
    # Confirm split-horizon: *.alvani.me resolves to local IP, not public
    target: dns://10.0.1.250
    query: traefik.alvani.me
    record_type: A
    expected_answer: "10.0.1.30"
    probes: [internal]

# ============================================================
# Ping checks — internal probe only (LAN node reachability)
# ============================================================

ping_checks:

  - service: kube01
    tier: infra
    target: 10.0.1.30
    probes: [internal]

  - service: kube02
    tier: infra
    target: 10.0.1.50
    probes: [internal]

  - service: kube03
    tier: infra
    target: 10.0.1.49
    probes: [internal]

  - service: 20-size
    tier: infra
    target: 10.0.1.203
    probes: [internal]

  - service: pihole
    tier: network
    target: 10.0.1.250
    probes: [internal]
