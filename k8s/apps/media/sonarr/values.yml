# Chart: bjw-s/app-template
# Repo: https://bjw-s.github.io/helm-charts
# Sonarr - TV show download and library management

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/sonarr
          tag: "latest@sha256:76414c033f290d3c9f1f9dfad71150abe71d92592369a3377a5903d579e6e2b2"
        env:
          TZ: America/Los_Angeles
          PUID: "1002"
          PGID: "100"
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 8989

ingress:
  main:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
    hosts:
      - host: sonarr.alvani.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: sonarr-tls
        hosts:
          - sonarr.alvani.me

  internal:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca-issuer
    hosts:
      - host: sonarr.lan
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: sonarr-lan-tls
        hosts:
          - sonarr.lan

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /config
  media:
    type: persistentVolumeClaim
    existingClaim: media-nfs-pvc
    globalMounts:
      - path: /media
