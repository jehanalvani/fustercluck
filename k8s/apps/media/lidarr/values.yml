# Chart: bjw-s/app-template
# Repo: https://bjw-s.github.io/helm-charts
# Lidarr - Music download and library management

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/lidarr
          tag: "latest@sha256:dbffcf91da47d48e09e613857032c95a62755b928a71a7718688e3ab03fbbd26"
        env:
          TZ: America/Los_Angeles
          PUID: "1002"
          PGID: "100"
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 8686

ingress:
  main:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
      traefik.ingress.kubernetes.io/router.middlewares: kube-system-basic-auth@kubernetescrd
    hosts:
      - host: lidarr.alvani.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: lidarr-tls
        hosts:
          - lidarr.alvani.me

  internal:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca-issuer
    hosts:
      - host: lidarr.lan
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: lidarr-lan-tls
        hosts:
          - lidarr.lan

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /config
  media:
    type: persistentVolumeClaim
    existingClaim: media-nfs-pvc
    globalMounts:
      - path: /media
