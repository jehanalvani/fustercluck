# Chart: bjw-s/app-template
# Repo: https://bjw-s.github.io/helm-charts
# Homebridge - HomeKit bridge for smart home integration

controllers:
  main:
    pod:
      # Enable host network for mDNS/HomeKit discovery (required for HomeKit)
      # This allows Homebridge to advertise services on the local network
      hostNetwork: true
      # DNS policy required when using hostNetwork
      dnsPolicy: ClusterFirstWithHostNet
      # Pin to designated HomeKit bridge node
      nodeSelector:
        homekit-bridge: "true"
    containers:
      main:
        image:
          repository: homebridge/homebridge
          tag: "latest@sha256:a420e1e355e79c97df13c43d677a6d20c4ca6a073c889c528a6271f391e91d8c"
        env:
          TZ: America/Los_Angeles
          HOMEBRIDGE_CONFIG_UI: "1"
          HOMEBRIDGE_CONFIG_UI_PORT: "8080"
          PGID: "995"
          PUID: "1002"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 60
              periodSeconds: 15
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 60
              periodSeconds: 15
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 10
              failureThreshold: 12
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 8080
      homekit:
        port: 51826

ingress:
  main:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
    hosts:
      - host: homebridge.alvani.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: homebridge-tls
        hosts:
          - homebridge.alvani.me

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /homebridge
