# Chart: bjw-s/app-template
# Mosquitto MQTT broker — IoT integration hub
#
# Exposed via LoadBalancer (klipper-lb) on port 1883 so LAN IoT devices
# (OpenGarage, ESPHome, Tasmota, etc.) can reach it directly.
# Connect IoT devices to 10.0.1.30:1883 (kube01).
#
# Authentication: anonymous allowed (home LAN, no external exposure).
# Add a password_file if you want per-device credentials later.

configMaps:
  config:
    data:
      mosquitto.conf: |
        listener 1883
        allow_anonymous true
        persistence false
        log_type error
        log_type warning
        log_type notice

controllers:
  main:
    containers:
      main:
        image:
          repository: eclipse-mosquitto
          tag: "2"
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

service:
  main:
    controller: main
    type: LoadBalancer
    ports:
      mqtt:
        port: 1883
        protocol: TCP

persistence:
  config:
    type: configMap
    name: mosquitto-config
    globalMounts:
      - path: /mosquitto/config/mosquitto.conf
        subPath: mosquitto.conf
