---
name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .
          strict: false

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install "ansible-lint==24.9.0" "ansible-core==2.17.7"

      - name: Run ansible-lint
        env:
          ANSIBLE_VAULT_IDENTITY_LIST: ""
        run: ansible-lint --config-file .ansible-lint
