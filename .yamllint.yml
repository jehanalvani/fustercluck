---
extends: default

rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  roles/*/templates/
  roles/*/vars/vault.yml
  roles/amcrest/
  roles/common/
  roles/docker/
  roles/fresh-rss/
  roles/homeassistant/
  roles/kavita/
  roles/rss-bridge/
  k8s/secrets/pub-cert.pem
  passfile.txt
  snippets/
