---
# Kubernetes Secrets Creation Playbook
#
# Creates all application secrets in the k3s cluster from Ansible Vault values.
# Must be run AFTER cluster_bootstrap.yml (namespaces must exist).
# Run BEFORE deploy_apps.yml.
#
# Secrets created:
#   media/nzbget-secret            - NZBGet web UI credentials
#   media/transmission-secret      - Transmission web UI credentials
#   monitoring/grafana-secret      - Grafana admin password
#   monitoring/influxdb-secret     - InfluxDB admin password
#   security/shinobi-db-secret     - Shinobi MySQL credentials
#
# Plex secret NOT handled here - PLEX_CLAIM is a 4-minute token from
# https://www.plex.tv/claim/ that must be created manually before deploying plex:
#   kubectl create secret generic plex-secret \
#     --from-literal=PLEX_CLAIM='claim-xxxxx' -n plex
#
# Usage:
#   ansible-playbook create_secrets.yml
#   ansible-playbook create_secrets.yml --tags nzbget

- hosts: k3s_server
  name: Create application secrets in k3s cluster
  remote_user: ansible
  become: no
  gather_facts: false
  vars_files:
    - vars/vars.yml
    - roles/common/vars/vault.yml
    - roles/nzbget/vars/main.yml
    - roles/transmission/vars/main.yml
    - roles/influxdb/vars/main.yml
    - roles/aistack/vars/main.yml

  tasks:

    - name: Create nzbget-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nzbget-secret
            namespace: media
          type: Opaque
          stringData:
            NZBGET_USER: "{{ nzbget_control_username }}"
            NZBGET_PASS: "{{ nzbget_control_password }}"
      tags: [nzbget]

    - name: Create transmission-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: transmission-secret
            namespace: media
          type: Opaque
          stringData:
            TRANSMISSION_USER: "{{ transmission_username }}"
            TRANSMISSION_PASS: "{{ transmission_user_pswd }}"
      tags: [transmission]

    - name: Create grafana-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-secret
            namespace: monitoring
          type: Opaque
          stringData:
            admin-password: "{{ vault_grafana_admin_password }}"
      tags: [grafana]

    - name: Create influxdb-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: influxdb-secret
            namespace: monitoring
          type: Opaque
          stringData:
            admin-password: "{{ influxdb_admin_password }}"
      tags: [influxdb]

    - name: Create cloudflare-api-token secret for cert-manager
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: cert-manager
          type: Opaque
          stringData:
            api-token: "{{ vault_cloudflare_api_token }}"
      tags: [certmanager, cloudflare]

    - name: Create shinobi-db-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: shinobi-db-secret
            namespace: security
          type: Opaque
          stringData:
            MYSQL_ROOT_PASSWORD: "{{ vault_shinobi_root_password }}"
            MYSQL_DATABASE: shinobi
            MYSQL_USER: shinobi
            MYSQL_PASSWORD: "{{ vault_shinobi_db_password }}"
      tags: [shinobi]

    # -------------------------------------------------------------------------
    # AI namespace
    # -------------------------------------------------------------------------

    - name: Create ai namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ai
      tags: [ai]

    - name: Create openhinotes-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: openhinotes-secret
            namespace: ai
          type: Opaque
          stringData:
            POSTGRES_PASSWORD: "{{ openhinotes_postgres_password }}"
            # Full URL: backend resolves postgres via localhost (same pod)
            DATABASE_URL: "postgresql+asyncpg://hinotes:{{ openhinotes_postgres_password }}@localhost:5432/openhinotes"
            SECRET_KEY: "{{ openhinotes_secret_key }}"
            ADMIN_EMAIL: "jehan@jehanalvani.com"
            ADMIN_PASSWORD: "{{ openhinotes_admin_password }}"
            VOICE_EMBEDDING_KEY: "{{ openhinotes_voice_embedding_key }}"
      tags: [ai, openhinotes]

    - name: Create whisper-secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: whisper-secret
            namespace: ai
          type: Opaque
          stringData:
            HF_TOKEN: "{{ huggingface_token }}"
      tags: [ai, whisper]
