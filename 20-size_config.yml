---

- name: Configure 20-size server
  hosts: 20-size.local
  remote_user: ansible
  become: yes

  pre_tasks:

    - name: Enable softlockup panic
      ansible.posix.sysctl:
        name: kernel.softlockup_panic
        value: 1
        state: present
        reload: true

    - name: Set kernel panic reboot delay
      ansible.posix.sysctl:
        name: kernel.panic
        value: 60
        state: present
        reload: true

  tasks:

    - name: "Create config dirs in {{ server_config_path }}"
      file:
        path: "{{ server_config_path }}{{ item }}"
        state: directory
        mode: 0775
        owner: ansible
        group: users
      loop:
        - nzbget/intermediate
        - rss-bridge
        - rss-bridge/app/bridges
        - transmission/config
        - homebridge
      tags: nfs

    - name: "Create media dirs in {{ server_media_path }}"
      file:
        path: "{{ server_media_path }}{{ item }}"
        state: directory
        mode: 0775
        owner: ansible
        group: users
      loop:
        - adult_audio
        - adult_books
        - adult_manga
        - adult_videos
        - anime
        - books
        - comics
        - manga
        - misc
        - movies
        - music
        - nzb_downloads
        - torrents/watch
        - torrents/downloads/complete
        - photos
        - security_cam_recordings
        - series
        - textbooks
        - videos
      tags: nfs

    # 16GB swapfile on the root NVMe filesystem - buffer against OOM kills.
    # ZFS pools (seatac/snoqualmie/whidbey) are NFS exports and must never be used for swap.
    - name: Create swapfile
      ansible.builtin.command: fallocate -l 16G /swapfile
      args:
        creates: /swapfile
      tags: swap

    - name: Set swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
        owner: root
        group: root
      tags: swap

    - name: Format swapfile
      ansible.builtin.command: mkswap /swapfile
      when: ansible_swaptotal_mb == 0
      tags: swap

    - name: Enable swapfile
      ansible.builtin.command: swapon /swapfile
      when: ansible_swaptotal_mb == 0
      tags: swap

    - name: Persist swapfile in /etc/fstab
      ansible.posix.mount:
        src: /swapfile
        name: none
        fstype: swap
        opts: sw
        dump: "0"
        passno: "0"
        state: present
      tags: swap

    # Prevent unattended-upgrades from touching GPU drivers or the kernel.
    # These must be deliberate, tested upgrades - not silent overnight installs.
    # Root cause of the May 2026 crash series: nvidia-driver-580 auto-upgraded,
    # broke the k8s device plugin health check, caused nightly kernel panics.
    - name: Block GPU drivers and kernel from unattended-upgrades
      ansible.builtin.blockinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        marker: "// {mark} ANSIBLE MANAGED - GPU/kernel upgrade blacklist"
        insertafter: "Unattended-Upgrade::Package-Blacklist {"
        block: |
          "nvidia-driver-.*";
          "nvidia-dkms-.*";
          "libnvidia-.*";
          "xserver-xorg-video-nvidia-.*";
          "linux-image-.*";
          "linux-headers-.*";
          "linux-generic.*";
      tags: apt_blacklist

    - name: Enable persistent journald logging
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?Storage="
        line: "Storage=persistent"
        state: present
      notify: restart journald
      tags: journald

    - name: "Install pipx, setuptools, virtualenv if not already"
      apt:
        name:
          - pipx
          - smartmontools
          - unrar
          - samba
        state: present
        update_cache: yes

    - name: "Install pyOpenSSL, crypto, docker if not already"
      vars:
        pipx_packages:
          - cryptography
          - docker
          - pyOpenSSL  # required for OpenSSL cert creation
      community.general.pipx:
        name: "{{ item }}"
        state: present
      with_items: "{{ pipx_packages }}"

  handlers:
    - name: restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

  roles:
    - role: common
      tags: common
    - role: geerlingguy.nfs
      # `insecure` option required for NFS to be mountable via MacOS' finder
      nfs_exports:
        - "/snoqualmie/media 10.0.1.0/24(rw,sync,all_squash,no_root_squash,insecure,crossmnt,insecure_locks,anonuid=1001,anongid=100)"
        - "/seatac/plex 10.0.1.0/24(rw,sync,all_squash,no_root_squash,insecure,crossmnt,insecure_locks,anonuid=1001,anongid=100)"
        - "/whidbey/configs 10.0.1.0/24(rw,sync,no_root_squash,insecure,crossmnt,insecure_locks,anonuid=1001,anongid=100)"
        - "/whidbey/backups 10.0.1.0/24(rw,sync,no_root_squash,insecure,crossmnt,insecure_locks,anonuid=1001,anongid=100)"
      tags: nfs
    - role: docker
      tags: docker
