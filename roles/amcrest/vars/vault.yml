# Amcrest camera credentials — sourced from 1Password HomeLab vault
# Migrated from encrypted Ansible vault values to OP references so credentials
# have a single source of truth in 1Password.
vault_amcrest_admin_password: "{{ lookup('pipe', 'op read \"op://HomeLab/Home Security Cameras - admin/password\"') }}"
vault_amcrest_automation_password: "{{ lookup('pipe', 'op read \"op://HomeLab/Home Security Cameras - automation/password\"') }}"
vault_amcrest_stream_password: "{{ lookup('pipe', 'op read \"op://HomeLab/Home Security Cameras - stream/password\"') }}"
