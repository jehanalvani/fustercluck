---
# tasks for installing k3s agents (worker nodes)

- name: Ensure /etc/rancher/k3s/ directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s/
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Template k3s agent configuration
  ansible.builtin.template:
    src: k3s-agent-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'

- name: Download and verify k3s binary
  ansible.builtin.include_tasks: install.yml

- name: Set up k3s agent service
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_SKIP_DOWNLOAD=true \
      K3S_URL="https://{{ k3s_server_host }}:{{ k3s_server_port }}" \
      K3S_TOKEN="{{ hostvars[k3s_server_host]['k3s_node_token'] }}" \
      sh -s - agent
  args:
    creates: /etc/systemd/system/k3s-agent.service
