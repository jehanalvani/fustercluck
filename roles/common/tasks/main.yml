---
# tasks file for common


- import_tasks: user_setup.yml

- name: Remove apt sources referencing dead kubernetes or docker mantic repos
  ansible.builtin.shell: |
    grep -rl 'apt\.kubernetes\.io\|download\.docker\.com' /etc/apt/sources.list.d/ 2>/dev/null | xargs rm -f
    sed -i '/apt\.kubernetes\.io/d' /etc/apt/sources.list 2>/dev/null
  changed_when: false

- name: Redirect EOL Ubuntu mantic repos to old-releases
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: 'http://ports\.ubuntu\.com/ubuntu-ports'
    replace: 'http://old-releases.ubuntu.com/ubuntu'
  when: ansible_facts['distribution_release'] == 'mantic'

- name: Install base packages
  apt:
      name:
          - tar
          - unzip
          - zsh
          - nfs-common
          - avahi-daemon
      state: present
      update_cache: yes


- name: "Include Raspbian (32-bit) libseccomp2 workaround if Raspbian 32-bit installed."
  include_tasks: raspbian_32_focal_alpine3.13.yml
  when: 
    - ansible_facts['lsb']['id'] == "Raspbian" 
    - ansible_facts['lsb']['codename'] == "buster" 
  
- name: Ensure cluster nodes resolvable via /etc/hosts (Go binaries bypass mDNS)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.names }}"
    regexp: "^{{ item.ip }}\\s"
    state: present
  loop: "{{ cluster_hosts }}"
  when: cluster_hosts is defined

- name: Configure Ubuntu cGroups Support on k3s cluster nodes
  include_tasks: ubuntu_cGroups.yml
  when: inventory_hostname in groups["k3s_cluster"]
    

