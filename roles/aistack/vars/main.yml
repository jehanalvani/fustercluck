---
# Non-secret vars — vault vars referenced here for clarity
anthropic_api_key: "{{ vault_anthropic_api_key }}"
litellm_master_key: "{{ vault_litellm_master_key }}"
searxng_secret_key: "{{ vault_searxng_secret_key }}"
bluebubbles_password: "{{ vault_bluebubbles_password }}"
ha_token: "{{ vault_ha_token }}"
litellm_db_password: "{{ vault_litellm_db_password }}"

# Fastmail app passwords — for marvin-mail (IMAP/SMTP) and vdirsyncer (CalDAV)
# Create at: Fastmail → Settings → Password & Security → App Passwords
#   marvin@packet.works: needs IMAP and CalDAV access
#   jehan@jehanalvani.com: needs IMAP and CalDAV access
# Naming convention: vault_fastmail_{account_id}_app_password
#                    vault_fastmail_{account_id}_email  (for non-owner accounts)
fastmail_marvin_app_password: "{{ vault_fastmail_marvin_app_password | default('') }}"
fastmail_jehan_app_password: "{{ vault_fastmail_jehan_app_password | default('') }}"

# Netgear Orbi router — admin credentials for SOAP API (port 5000)
# Password pulled from 1Password at deploy time (same item as HA role)
netgear_router_ip: "10.0.1.1"
netgear_soap_port: 443
netgear_soap_ssl: true
netgear_admin_password: "{{ lookup('pipe', 'op read \"op://HomeLab/Netgear Orbi Router/password\"') }}"

# Grafana — dashboard management
# 1Password: op://HomeLab/Grafana - MarvinMail Dashboarding Service Account Token/credential
# Not vaulted yet — no Ansible task consumes it. Vault when Grafana deploy automation is built.
# grafana_marvinmail_dashboard_token: "{{ vault_grafana_marvinmail_dashboard_token }}"

# Grafana Cloud write credentials — used by marvin-health-exporter
# prometheus_url and prometheus_user are stable/non-secret; api_key is vaulted.
# 1Password: op://HomeLab/Grafana Cloud - Prometheus Write/credential
grafana_cloud_prometheus_url: "https://prometheus-prod-67-prod-us-west-0.grafana.net/api/prom/push"
grafana_cloud_prometheus_user: "3065256"
grafana_cloud_api_key: "{{ vault_grafana_cloud_api_key }}"

# Household accounts — add a var pair here for each entry in mail_accounts.yml
fastmail_lindsay_email: "{{ vault_fastmail_lindsay_email | default('') }}"
fastmail_lindsay_app_password: "{{ vault_fastmail_lindsay_app_password | default('') }}"

# Pi-hole — API password for stats exporter (same as web UI password)
pihole_api_password: "{{ lookup('pipe', 'op read \"op://HomeLab/Pihole/App Password\"') }}"

# OpenHiNotes — audio transcription web app (k8s, ai namespace)
openhinotes_postgres_password: "{{ lookup('pipe', 'op read \"op://HomeLab/OpenHiNotes Postgres Password/credential\"') }}"
openhinotes_secret_key: "{{ lookup('pipe', 'op read \"op://HomeLab/OpenHiNotes Secret Key/credential\"') }}"
openhinotes_admin_password: "{{ lookup('pipe', 'op read \"op://HomeLab/OpenHiNotes /password\"') }}"
openhinotes_voice_embedding_key: "{{ lookup('pipe', 'op read \"op://HomeLab/OpenHiNotes Voice Embed Key/credential\"') }}"

# HuggingFace token — for Pyannote speaker diarization in faster-whisper-server
huggingface_token: "{{ lookup('pipe', 'op read \"op://HomeLab/OpenHiNotes HuggingFace Token/credential\"') }}"
