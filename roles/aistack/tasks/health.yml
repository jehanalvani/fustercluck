---
# Homelab health check scripts for Marvin's heartbeat and Prometheus/Grafana
#
# marvin_health.py       — run by Marvin on demand or during heartbeat; outputs JSON
# marvin_health_exporter — cron every 5 min; writes textfile metrics for node_exporter
#
# Requires vault_grafana_cloud_api_key (used in grafana_cloud_config.json.j2)

- name: Deploy marvin_health.py
  ansible.builtin.copy:
    src: marvin_health.py
    dest: /home/openclaw/marvin_health.py
    owner: openclaw
    group: openclaw
    mode: "0755"

- name: Deploy marvin-health script
  ansible.builtin.copy:
    src: marvin_health.py
    dest: /usr/local/bin/marvin-health
    owner: root
    group: root
    mode: "0755"

- name: Deploy marvin-health-sim script
  ansible.builtin.copy:
    src: marvin_health_sim.py
    dest: /usr/local/bin/marvin-health-sim
    owner: root
    group: root
    mode: "0755"

- name: Deploy marvin-health-exporter script
  ansible.builtin.copy:
    src: marvin_health_exporter.py
    dest: /usr/local/bin/marvin-health-exporter
    owner: root
    group: root
    mode: "0755"

- name: Create node_exporter textfile collector directory
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    owner: root
    group: openclaw
    mode: "0775"
  # openclaw writes .prom files; node_exporter pod reads them via hostPath (runs as root)

- name: Set up marvin-health-exporter cron (every 5 minutes)
  ansible.builtin.cron:
    name: marvin health exporter
    minute: "*/5"
    job: >-
      /usr/local/bin/marvin-health-exporter
      >>/home/openclaw/.openclaw/health-exporter.log 2>&1
    user: openclaw

- name: Deploy grafana-cloud.json from vault
  ansible.builtin.template:
    src: grafana_cloud_config.json.j2
    dest: /home/openclaw/.openclaw/grafana-cloud.json
    owner: openclaw
    group: openclaw
    mode: "0600"
