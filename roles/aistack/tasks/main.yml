---
- name: Create AI stack config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: ansible
    group: users
  loop:
    - "{{ aistack_base_path }}"
    - "{{ ollama_models_path }}"
    - "{{ litellm_config_path }}"
    - "{{ searxng_config_path }}"

- name: Import NVIDIA runtime tasks
  import_tasks: nvidia_runtime.yml
  tags: nvidia

- name: Import Docker network tasks
  import_tasks: network.yml
  tags: network
- name: Import Ollama tasks
  import_tasks: ollama.yml
  tags: ollama
- name: Import LiteLLM tasks
  import_tasks: litellm.yml
  tags: litellm
- name: Import SearXNG tasks
  import_tasks: searxng.yml
  tags: searxng
- name: Import browser tasks
  import_tasks: browser.yml
  tags: browser
- name: Import OpenClaw tasks
  import_tasks: openclaw.yml
  tags: openclaw
- name: Import mail/calendar tasks
  import_tasks: mail_calendar.yml
  tags: mail_calendar
- name: Import Home Assistant tasks
  import_tasks: ha.yml
  tags: ha
- name: Import health check tasks
  import_tasks: health.yml
  tags: health
- name: Import notify tasks
  import_tasks: notify.yml
  tags: notify
- name: Import Marvin tasks
  import_tasks: marvin.yml
  tags: marvin
- name: Import backup tasks
  import_tasks: backup.yml
  tags: backup
- name: Import Netgear tasks
  import_tasks: netgear.yml
  tags: netgear
- name: Import Pi-hole tasks
  import_tasks: pihole.yml
  tags: pihole
