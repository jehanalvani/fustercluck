---
# 1Password: desktop client, CLI, and Chrome browser extension
# Docs: https://support.1password.com/install-linux/

- name: Add 1Password apt signing key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /usr/share/keyrings/1password-archive-keyring.asc
    mode: "0644"

- name: Add 1Password apt repository
  ansible.builtin.apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.asc]
      https://downloads.1password.com/linux/debian/amd64 stable main
    state: present
    filename: 1password

- name: Install 1Password desktop and CLI
  ansible.builtin.apt:
    name:
      - 1password
      - 1password-cli
    state: present
    update_cache: yes

# Deploy Chrome managed policy to auto-install the 1Password extension
# Extension ID: aeblfdkhhhdcdjpifhhbdiojplfjncoa
- name: Create Chrome managed policy directory
  ansible.builtin.file:
    path: /etc/opt/chrome/policies/managed
    state: directory
    mode: "0755"

- name: Deploy Chrome extension policy for 1Password
  ansible.builtin.copy:
    dest: /etc/opt/chrome/policies/managed/1password-extension.json
    mode: "0644"
    content: |
      {
        "ExtensionInstallForcelist": [
          "aeblfdkhhhdcdjpifhhbdiojplfjncoa;https://clients2.google.com/service/update2/crx"
        ]
      }

# NOTE: For autonomous CLI use by Marvin, a 1Password Service Account is required.
# Create one at: https://developer.1password.com/docs/service-accounts/
# Add the token as vault_op_service_account_token in aistack vault, then wire
# OP_SERVICE_ACCOUNT_TOKEN into the openclaw-gateway.service env.
