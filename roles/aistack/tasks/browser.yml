---
# Install Google Chrome (not snap Chromium — snap's AppArmor confinement
# interferes with how OpenClaw spawns and monitors the browser process)

- name: Check if Google Chrome is installed
  ansible.builtin.command: google-chrome-stable --version
  register: chrome_check
  changed_when: false
  failed_when: false

- name: Install Chrome dependencies (Ubuntu 24.04 renamed libasound2 → libasound2t64)
  ansible.builtin.apt:
    name:
      - libasound2t64
      - libatk-bridge2.0-0
      - libgtk-3-0
      - libxss1
    state: present
    update_cache: yes
  when: chrome_check.rc != 0

- name: Download Google Chrome deb
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    dest: /tmp/google-chrome-stable.deb
    mode: "0644"
  when: chrome_check.rc != 0

- name: Install Google Chrome (force-depends for libasound2 rename)
  ansible.builtin.command: dpkg -i --force-depends /tmp/google-chrome-stable.deb
  when: chrome_check.rc != 0
  register: chrome_dpkg
  changed_when: chrome_dpkg.rc == 0

- name: Fix any broken packages after Chrome install
  ansible.builtin.apt:
    state: fixed
  when: chrome_check.rc != 0

- name: Remove Chrome deb
  ansible.builtin.file:
    path: /tmp/google-chrome-stable.deb
    state: absent
  when: chrome_check.rc != 0

- name: Install Playwright Chromium for OpenClaw
  ansible.builtin.command: >
    node /usr/lib/node_modules/openclaw/node_modules/playwright-core/cli.js install chromium
  environment:
    PLAYWRIGHT_BROWSERS_PATH: /home/openclaw/.openclaw/browsers
  register: playwright_install
  changed_when: "'already installed' not in playwright_install.stdout"

- name: Fix Playwright browsers ownership
  ansible.builtin.file:
    path: /home/openclaw/.openclaw/browsers
    owner: openclaw
    group: openclaw
    recurse: yes
