---
pihole_config_path: /opt/pihole/etc-pihole
pihole_dnsmasq_path: /opt/pihole/etc-dnsmasq.d
pihole_network_name: lan
pihole_lan_interface: eth0  # RPi4 wired NIC — verify with `ip link show` on kube01
pihole_ip: 10.0.1.250
pihole_timezone: America/Los_Angeles
pihole_upstream_dns: "185.37.37.37;1.1.1.1"
pihole_dhcp_fallback_dns: "10.0.1.1"  # Router — clients fall back here if Pi-hole is unresponsive
# Macvlan shim: kube01 host cannot communicate with its own macvlan containers
# via eth0 (macvlan isolation). A shim interface on the same parent allows
# host→Pi-hole communication, which fixes systemd-resolved and CoreDNS forwarding.
pihole_host_shim_ip: "10.0.1.251"

# Block adlists. This is the full desired set — lists not in this array will
# be removed from Pi-hole on the next playbook run (fully declarative).
# To add a new list: add it here and re-run pihole.yml.
pihole_adlists:
  - address: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
    comment: "StevenBlack unified hosts"
  - address: "https://lists.zachlagden.uk/lists/all_domains.txt"
    comment: "Zach's List"
pihole_dhcp_active: "true"
pihole_dhcp_start: 10.0.1.2
pihole_dhcp_end: 10.0.1.249
pihole_dhcp_router: 10.0.1.1
pihole_dhcp_leasetime: 24h

pihole_web_password: !vault |
          $ANSIBLE_VAULT;1.2;AES256;fustercluck
          34643839373164353064353431626532613262623036633861663436303938356431346563393233
          3930343536353365343965623739346130343634373631650a376464363834663033386335323830
          62666637313061306631663533633535373734656633313234343961366538373935316664316465
          3835616134313666660a323533616139353861643266636139323565313334373732353034313563
          3530

