---
# tasks file for roles/pihole
# Deploys Pi-hole v6 with macvlan networking on kube01
# Pi-hole gets its own LAN IP (10.0.1.250) — no NAT/DNAT needed
#
# Source of truth: all Ansible-managed settings (DNS, adlists, DHCP) are
# applied on every run. UI edits to these settings will be overwritten.
# Client names, groups, and allow/deny entries are UI-managed and untouched.

# --- Host networking fixes for macvlan isolation ---
# kube01 cannot reach its own macvlan container (Pi-hole) via eth0 due to macvlan
# isolation. A shim interface on the same parent (eth0) bridges this gap.
# Without it: systemd-resolved and CoreDNS both fail to forward DNS upstream.

- name: Create macvlan shim systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/macvlan-shim.service
    mode: "0644"
    content: |
      [Unit]
      Description=Macvlan shim — allows kube01 host to reach Pi-hole macvlan container
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStartPre=-/sbin/ip link del macvlan-shim
      ExecStart=/sbin/ip link add macvlan-shim link {{ pihole_lan_interface }} type macvlan mode bridge
      ExecStart=/sbin/ip addr add {{ pihole_host_shim_ip }}/32 dev macvlan-shim
      ExecStart=/sbin/ip link set macvlan-shim up
      ExecStart=/sbin/ip route add {{ pihole_ip }}/32 dev macvlan-shim
      ExecStop=/sbin/ip link del macvlan-shim

      [Install]
      WantedBy=multi-user.target
  notify: Enable and start macvlan-shim

- name: Create systemd-resolved global DNS config
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Configure systemd-resolved to use Pi-hole via global (non-interface-bound) DNS
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/pihole.conf
    mode: "0644"
    content: |
      # Global DNS config — not bound to eth0 interface, so traffic uses the
      # kernel routing table and reaches Pi-hole via the macvlan-shim.
      [Resolve]
      DNS={{ pihole_ip }}
      FallbackDNS={{ pihole_dhcp_fallback_dns }} 1.1.1.1
      Domains=~.
  notify: Restart systemd-resolved

# --- CoreDNS ConfigMap patch ---
# CoreDNS forwards to /etc/resolv.conf by default, which is systemd-resolved's
# stub (127.0.0.53). Point it directly at Pi-hole so cluster pods resolve correctly.
# Note: k3s may reset the coredns ConfigMap on upgrades — re-run this playbook after.

- name: Patch CoreDNS to forward to Pi-hole
  ansible.builtin.command:
    cmd: >
      kubectl patch configmap coredns -n kube-system --type merge
      -p '{"data":{"Corefile": null}}'
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false
  check_mode: false

- name: Update CoreDNS forward directive to use Pi-hole
  ansible.builtin.shell: |
    kubectl get configmap coredns -n kube-system -o json | \
    python3 -c "
    import sys,json
    cm = json.load(sys.stdin)
    cf = cm['data']['Corefile']
    desired = 'forward . {{ pihole_ip }} {{ pihole_dhcp_fallback_dns }}'
    if 'forward . {{ pihole_ip }}' not in cf:
      cf = cf.replace('forward . /etc/resolv.conf', desired)
      cm['data']['Corefile'] = cf
      print(json.dumps(cm))
    else:
      print('no-change')
    " | grep -v no-change | kubectl apply -f - || true
  delegate_to: localhost
  become: false
  run_once: true
  register: coredns_patch
  changed_when: "'configured' in coredns_patch.stdout"

- name: Restart CoreDNS if forward directive changed
  ansible.builtin.command:
    cmd: kubectl rollout restart deployment/coredns -n kube-system
  delegate_to: localhost
  become: false
  run_once: true
  when: coredns_patch.changed

- name: Create Pi-hole config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pihole_config_path }}"
    - "{{ pihole_dnsmasq_path }}"

- name: Configure DHCP secondary DNS fallback
  ansible.builtin.copy:
    content: "dhcp-option=6,{{ pihole_ip }},{{ pihole_dhcp_fallback_dns }}\n"
    dest: "{{ pihole_dnsmasq_path }}/03-dhcp-dns-fallback.conf"
    mode: "0644"
  notify: Restart Pi-hole container

- name: Configure .lan wildcard DNS to Traefik
  ansible.builtin.copy:
    content: "address=/.lan/10.0.1.30\n"
    dest: "{{ pihole_dnsmasq_path }}/04-lan-wildcard.conf"
    mode: "0644"
  notify: Restart Pi-hole container

- name: Create Docker macvlan network on LAN interface
  community.docker.docker_network:
    name: "{{ pihole_network_name }}"
    driver: macvlan
    driver_options:
      parent: "{{ pihole_lan_interface }}"
    ipam_config:
      - subnet: "10.0.1.0/24"
        gateway: "10.0.1.1"
    state: present

- name: Remove legacy dnsmasq DHCP hosts file
  ansible.builtin.file:
    path: "{{ pihole_dnsmasq_path }}/02-dhcp-hosts.conf"
    state: absent

- name: Deploy Pi-hole container on macvlan
  community.docker.docker_container:
    name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    restart_policy: unless-stopped
    state: started
    capabilities:
      - NET_ADMIN
    networks:
      - name: "{{ pihole_network_name }}"
        ipv4_address: "{{ pihole_ip }}"
    env:
      TZ: "{{ pihole_timezone }}"
      # WEBPASSWORD applied by entrypoint on every start. Source of truth: op://HomeLab/Pihole/App Password
      WEBPASSWORD: "{{ pihole_app_password }}"
      FTLCONF_dhcp_active: "{{ pihole_dhcp_active }}"
      FTLCONF_dhcp_hosts: "{{ pihole_dhcp_hosts | map(attribute='mac') | zip(pihole_dhcp_hosts | map(attribute='ip'), pihole_dhcp_hosts | map(attribute='name')) | map('join', ',') | join(';') }}"
      FTLCONF_dhcp_start: "{{ pihole_dhcp_start }}"
      FTLCONF_dhcp_end: "{{ pihole_dhcp_end }}"
      FTLCONF_dhcp_router: "{{ pihole_dhcp_router }}"
      FTLCONF_dhcp_leaseTime: "{{ pihole_dhcp_leasetime }}"
    volumes:
      - "{{ pihole_config_path }}:/etc/pihole"
      - "{{ pihole_dnsmasq_path }}:/etc/dnsmasq.d"
  register: pihole_container

- name: Wait for Pi-hole to become healthy
  ansible.builtin.command:
    cmd: docker inspect --format="{{ '{{' }}.State.Health.Status{{ '}}' }}" pihole
  register: pihole_health
  until: pihole_health.stdout == "healthy"
  retries: 12
  delay: 10

- name: Authenticate with Pi-hole API
  ansible.builtin.uri:
    url: "http://{{ pihole_ip }}/api/auth"
    method: POST
    body_format: json
    body:
      password: "{{ pihole_app_password }}"
    status_code: 200
  register: pihole_auth

# --- DNS config (always applied) ---
# pihole_upstream_dns and pihole_local_hosts in vars/main.yml are the source
# of truth. UI edits to these will be overwritten on next playbook run.
# NOTE: requires app_sudo on the app password (Pi-hole UI → Settings → API → App passwords).
# Currently non-fatal — settings are stable and managed manually if needed.

- name: Apply upstream DNS and local host overrides
  ansible.builtin.uri:
    url: "http://{{ pihole_ip }}/api/config/dns"
    method: PATCH
    body_format: json
    body:
      config:
        dns:
          upstreams: "{{ pihole_upstream_dns.split(';') }}"
          hosts: "{{ pihole_local_hosts | map(attribute='ip') | zip(pihole_local_hosts | map(attribute='hostname')) | map('join', ' ') | list }}"
    headers:
      sid: "{{ pihole_auth.json.session.sid }}"
    status_code: 200
  changed_when: true
  ignore_errors: true

# --- Adlist reconciliation (always applied, declarative) ---
# pihole_adlists in vars/main.yml is the full desired set. Lists added via
# the UI that are not in vars will be removed on next playbook run.
# NOTE: requires app_sudo — non-fatal, same as DNS config above.

- name: Get current block adlists
  ansible.builtin.uri:
    url: "http://{{ pihole_ip }}/api/lists?type=block"
    headers:
      sid: "{{ pihole_auth.json.session.sid }}"
  register: pihole_current_lists
  ignore_errors: true

- name: Add missing adlists
  ansible.builtin.uri:
    url: "http://{{ pihole_ip }}/api/lists"
    method: POST
    body_format: json
    body:
      address: "{{ item.address }}"
      comment: "{{ item.comment | default('') }}"
      type: block
      enabled: true
    headers:
      sid: "{{ pihole_auth.json.session.sid }}"
    status_code: [200, 201]
  loop: "{{ pihole_adlists }}"
  when: item.address not in ((pihole_current_lists.json.lists | default([])) | map(attribute='address') | list)
  changed_when: true
  ignore_errors: true
  notify: Update Pi-hole gravity

- name: Remove adlists not in Ansible config
  ansible.builtin.uri:
    url: "http://{{ pihole_ip }}/api/lists/{{ item.id }}?type={{ item.type }}"
    method: DELETE
    headers:
      sid: "{{ pihole_auth.json.session.sid }}"
    status_code: [200, 204, 404]
  loop: "{{ (pihole_current_lists.json.lists | default([])) }}"
  when: item.address not in (pihole_adlists | map(attribute='address') | list)
  changed_when: true
  ignore_errors: true
  notify: Update Pi-hole gravity

- name: Pi-hole deployed
  ansible.builtin.debug:
    msg: "Pi-hole is running at http://{{ pihole_ip }}/admin"
